repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-merge-conflict

  - repo: local
    hooks:
      - id: prettier-check
        name: prettier-check
        entry: npm run format:check
        language: system
        pass_filenames: false
      - id: eslint
        name: eslint
        entry: npm run lint
        language: system
        pass_filenames: false
